<section id="contact" class="py-24 px-8">

  <div class="max-w-5xl mx-auto">

    <div class="text-center mb-14">

      <p class="text-yellow-400 uppercase tracking-[6px] text-sm mb-4">
        Contact
      </p>

      <h2 class="text-5xl font-bold">
        Let's Build Your Next Website
      </h2>

      <p class="text-gray-400 mt-5 max-w-2xl mx-auto">
        Have a project in mind? I'd love to hear about it. Fill out the form below and let's discuss your ideas.
      </p>

    </div>

    <form (ngSubmit)="sendEmail()" class="space-y-6">

      <input
        type="text"
        name="from_name"
        [(ngModel)]="form.from_name"
        placeholder="Your Name"
        class="w-full rounded-xl border border-white/10 bg-white/5 p-4 outline-none focus:border-yellow-400"
        required>

      <input
        type="email"
        name="from_email"
        [(ngModel)]="form.from_email"
        placeholder="Your Email"
        class="w-full rounded-xl border border-white/10 bg-white/5 p-4 outline-none focus:border-yellow-400"
        required>

      <textarea
        rows="6"
        name="message"
        [(ngModel)]="form.message"
        placeholder="Tell me about your project..."
        class="w-full rounded-xl border border-white/10 bg-white/5 p-4 outline-none focus:border-yellow-400"
        required></textarea>

      <button
        type="submit"
        class="rounded-full bg-yellow-400 px-8 py-4 font-semibold text-black transition-all duration-300 hover:scale-105 hover:bg-yellow-300">
        Send Message
      </button>

    </form>

  </div>

</section>
